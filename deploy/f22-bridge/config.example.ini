[device]
; The F22's IP on the gym LAN (give it a fixed/reserved IP on the router).
ip = 192.168.1.201
port = 4370
; Device "Comm password" if you set one on the F22 (Menu > Comm > ...). 0 = none.
password = 0
; Set true only if TCP connect fails on your LAN.
force_udp = false
; Set true if the LAN blocks ping (connect() will skip the ping pre-check).
ommit_ping = false

[cloud]
; Your gym software base URL (no trailing slash).
base_url = https://bhatti.gym.goxx.app
; Must equal F22_DEVICE_KEY in the server's .env  (openssl rand -hex 24).
device_key = PASTE_F22_DEVICE_KEY_HERE
; Any label for this device (shows on the monitor).
device_sn = F22-GYM-1

[bridge]
; How often to push the paid/unpaid roster to the device (seconds).
sync_interval = 45
heartbeat_interval = 30
template_cache_dir = ./cache
state_file = ./state.json
