# Add to any bhatti-style vhost to accept F22 (ZKTeco ADMS) pushes.
# Serve on BOTH port 80 (skips the HTTPS redirect for /iclock/*) and 443:
# F22 firmwares default to HTTP:80 and often won't follow a 301 for POST.

# In the HTTPS server block:
location ^~ /iclock/ { rewrite ^ /iclock.php last; }

# In the HTTP (port 80) server block — before the "return 301 https..." line:
location ^~ /iclock/ { rewrite ^ /iclock.php last; }
location ~ \.php$ {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
}
