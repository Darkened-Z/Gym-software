<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile - Men</title>
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="assets/icons/gym-icon.svg">
    <link rel="apple-touch-icon" href="assets/icons/gym-icon-192.png">
    <link rel="stylesheet" href="assets/css/member-profile.css?v=7">
    <link rel="stylesheet" href="assets/css/pwa.css">
    <style>
        .btn {
            background: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- Lookup -->
    <div class="lookup-bar">
        <div class="lookup-container" style="flex-wrap: wrap; align-items: center;">
            <input id="memberCodeInput" class="lookup-input" placeholder="Enter member code" autofocus autocomplete="off" spellcheck="false" autocapitalize="characters" enterkeyhint="go" inputmode="text">
            <button id="lookupBtn" class="btn">Open Profile</button>
            <button class="btn" onclick="logoutMemberProfile()" style="background:#dc2626;">Logout</button>
        </div>
    </div>

    <!-- Profile -->
    <div class="member-content">
        <div id="memberContent">
            <div class="loading">Search for a member to open the profile.</div>
        </div>
    </div>

    <script src="assets/js/utils.js?v=6"></script>
    <script src="assets/js/offline-state.js?v=2"></script>
    <script src="assets/js/pwa.js?v=3"></script>
    <script src="assets/js/member-profile.js?v=8"></script>

    <script>
        window.MEMBER_GENDER = 'men';

        document.addEventListener("DOMContentLoaded", () => {
            if (!Utils.isOnline()) return;
            fetch('api/auth.php?action=check')
                .then(r => r.json())
                .then(data => {
                    if (data.authenticated && data.role === 'member' && data.gender === 'men') {
                        loadMemberProfile(data.member_code);
                    }
                });
        });
    </script>

</body>

</html>
