<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhatti Gym — Member (Men)</title>
    <meta name="theme-color" content="#0d0d0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/images/bhatti-logo.png">
    <link rel="apple-touch-icon" href="assets/icons/bhatti-icon-192.png">
    <link rel="stylesheet" href="assets/css/member-profile.css?v=7">
    <link rel="stylesheet" href="assets/css/pwa.css">
    <link rel="stylesheet" href="assets/css/brand.css?v=2">
    <style>
        .btn {
            background: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div id="brand-splash" aria-hidden="true">
        <img src="assets/images/bhatti-logo.png" alt="Bhatti Gym" class="brand-splash-logo">
    </div>

    <!-- Lookup -->
    <div class="lookup-bar">
        <div class="lookup-container" style="flex-wrap: wrap; align-items: center;">
            <img src="assets/images/bhatti-logo.png" alt="Bhatti Gym logo" class="brand-sidebar-logo">
            <input id="memberCodeInput" class="lookup-input" placeholder="Enter member code" autofocus autocomplete="off" spellcheck="false" autocapitalize="characters" enterkeyhint="go" inputmode="text">
            <button id="lookupBtn" class="btn">Open Profile</button>
            <button class="btn" onclick="logoutMemberProfile()" style="background:#dc2626;">Logout</button>
        </div>
    </div>

    <!-- Profile -->
    <div class="member-content">
        <div id="memberContent">
            <div class="loading">Search for a member to open the profile.</div>
        </div>
    </div>

    <script>
        // Brand splash: show logo ~0.6s then fade out.
        (function () {
            var s = document.getElementById('brand-splash');
            if (!s) return;
            window.setTimeout(function () {
                s.classList.add('brand-hide');
                window.setTimeout(function () { s.style.display = 'none'; }, 450);
            }, 600);
        })();
    </script>
    <script src="assets/js/utils.js?v=6"></script>
    <script src="assets/js/offline-state.js?v=1"></script>
    <script src="assets/js/pwa.js?v=2"></script>
    <script src="assets/js/member-profile.js?v=8"></script>

    <script>
        window.MEMBER_GENDER = 'men';

        document.addEventListener("DOMContentLoaded", () => {
            if (!Utils.isOnline()) return;
            fetch('api/auth.php?action=check')
                .then(r => r.json())
                .then(data => {
                    if (data.authenticated && data.role === 'member' && data.gender === 'men') {
                        loadMemberProfile(data.member_code);
                    }
                });
        });
    </script>

</body>

</html>
